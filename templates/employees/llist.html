<!-- templates/employees/list.html -->
 {% extends "base.html" %}

 {% block title %}社員一覧{% endblock %}

{% block content %}
<div class="container">
    <h1>社員一覧</h1>
    <a href="/employee/new" class="btn btn-primary">新規登録</a>

    <table class="table">
        <thead>
            <tr>
                <th>社員ID</th>
                <th>氏名</th>
                <th>部署</th>
                <th>役職</th>
                <th>入社日</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for emp in employees %}
            <tr>
                <td>{{ emp.employee_id }}</td>
                <td>{{ emp.name }}</td>
                <td>{{ emp.department }}</td>
                <td>{{ emp.position }}</td>
                <td>{{ emp.hire_date }}</td>
                <td>
                    <a href="/employee/{{ emp.employee_id }}" >詳細</a>
                    <a href="/employee/{{ emp.employee_id }}/edit" >編集</a>
                    <a href="/employee/{{ emp.employee_id }}/delete" >削除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
